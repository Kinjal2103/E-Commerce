<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .ambient-shadow {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }
        .focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }
        .glass-background {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Header Suppression: Auth pages usually hide global nav to focus on the task. 
         However, the JSON provides TopNavBar which we can use in a simplified way if required. 
         Following the "Task-Focused Suppression" rule, I will prioritize a focused canvas. -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Atmospheric Background Effect -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-30">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-container-highest rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed rounded-full blur-[120px]"></div>
</div>
<!-- Authentication Card -->
<div class="w-full max-w-[440px] z-10 animate-fade-in">
<div class="bg-surface-container-lowest p-lg md:p-xl rounded-xl ambient-shadow border border-outline-variant/20">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-lg">
<div class="mb-md">
<span class="font-display-lg text-display-lg tracking-tighter text-primary">LUMINA</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-background">Welcome Back</h1>
<p class="font-body-md text-secondary mt-xs">Please enter your details to sign in.</p>
</div>
<!-- Error Placeholder (Hidden by default) -->
<div class="hidden mb-md p-sm bg-error-container text-on-error-container rounded-lg flex items-center gap-sm" id="error-message">
<span class="material-symbols-outlined text-[20px]">error</span>
<span class="font-label-md text-label-md">Invalid email or password. Please try again.</span>
</div>
<!-- Login Form -->
<form class="space-y-md" id="login-form" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative focus-ring rounded-xl border border-outline-variant transition-all">
<input class="w-full bg-transparent px-md py-sm rounded-xl focus:outline-none focus:border-primary border-none text-body-md placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative focus-ring rounded-xl border border-outline-variant transition-all flex items-center">
<input class="w-full bg-transparent px-md py-sm rounded-xl focus:outline-none focus:border-primary border-none text-body-md placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="px-md text-secondary hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-label-md text-label-md text-secondary cursor-pointer select-none" for="remember">Remember for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-sm px-lg rounded-xl font-label-md text-label-md hover:bg-primary-container transition-all active:scale-[0.98] flex items-center justify-center gap-sm" id="submit-btn" type="submit">
<span id="btn-text">Login</span>
<div class="hidden animate-spin h-5 w-5 border-2 border-on-primary border-t-transparent rounded-full" id="btn-loader"></div>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-outline uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-surface-container-lowest border border-outline-variant px-lg py-sm rounded-xl font-label-md text-label-md text-on-background hover:bg-secondary-container transition-all flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign in with Google
                    </button>
</form>
<!-- Signup Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-secondary">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Sign up for free</a>
</p>
</div>
</div>
<!-- Footer-style Branding (Copyright) -->
<div class="mt-md text-center">
<p class="font-label-sm text-label-sm text-outline">© 2024 LUMINA. All rights reserved.</p>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Loading State
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            // Simulate API Call
            setTimeout(() => {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                
                // For demonstration, just show error
                const email = document.getElementById('email').value;
                if (email !== "demo@lumina.com") {
                    errorMessage.classList.remove('hidden');
                    errorMessage.style.animation = 'fadeIn 0.3s ease-out';
                } else {
                    alert('Login successful! Redirecting...');
                }
            }, 1500);
        });

        // Interactive subtle mouse tracking for the background blur
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const blur1 = document.querySelector('.bg-surface-container-highest');
            const blur2 = document.querySelector('.bg-primary-fixed');
            
            if (blur1 && blur2) {
                blur1.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
                blur2.style.transform = `translate(${x * -20}px, ${y * -20}px)`;
            }
        });
    </script>
</body></html>
